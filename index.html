<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Life Choices Ultimate</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
max-width:900px;
margin:auto;
padding:15px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-bottom:10px;
}

button,input,select{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:8px;
}

button{
background:#2563eb;
color:white;
font-weight:bold;
}

progress{
width:100%;
height:20px;
}
</style>
</head>

<body>

<div id="setup" class="card">

<h1>🌎 Life Choices Ultimate</h1>

<input id="name" placeholder="Name">

<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<select id="country">
<option>USA</option>
<option>Canada</option>
<option>UK</option>
<option>Australia</option>
</select>

<button onclick="beginLife()">👶 Begin Life</button>

</div>

<div id="game" style="display:none;">

<div class="card">

<h2 id="title"></h2>

<p>🎂 Age: <span id="age">0</span></p>
<p>💰 Money: $<span id="money">0</span></p>
<p>🏠 Family: <span id="family">Poor</span></p>

<p>❤️ Happiness</p>
<progress id="happy" value="70" max="100"></progress>

<p>🧠 Smarts</p>
<progress id="smart" value="70" max="100"></progress>

<p>💪 Health</p>
<progress id="health" value="80" max="100"></progress>

<p>😎 Looks</p>
<progress id="looks" value="70" max="100"></progress>

<p>👮 Crime</p>
<progress id="crime" value="0" max="100"></progress>

</div>

<div class="card">

<h3>📖 Life Event</h3>

<p id="event">
Welcome to the world.
</p>

<div id="choices"></div>

</div>

<button onclick="ageUp()">
🎂 Age Up
</button>

</div>

<script>

let player={};

function beginLife(){

let wealth="Poor";

let roll=Math.random()*100;

if(roll>45) wealth="Working Class";
if(roll>75) wealth="Middle Class";
if(roll>93) wealth="Upper Class";
if(roll>98) wealth="Rich";

player={
name:document.getElementById("name").value || "Alex",
gender:document.getElementById("gender").value,
country:document.getElementById("country").value,
age:0,
money:0,
wealth:wealth,
happy:70,
smart:70,
health:80,
looks:70,
crime:0
};

document.getElementById("setup").style.display="none";
document.getElementById("game").style.display="block";

document.getElementById("title").innerHTML=
"👤 "+player.name+" | 🌎 "+player.country;

document.getElementById("family").innerText=
wealth;

document.getElementById("event").innerHTML=
"👶 You were born into a "+wealth+" family.";

}

function updateStats(){

document.getElementById("age").innerText=player.age;
document.getElementById("money").innerText=player.money;

document.getElementById("happy").value=player.happy;
document.getElementById("smart").value=player.smart;
document.getElementById("health").value=player.health;
document.getElementById("looks").value=player.looks;
document.getElementById("crime").value=player.crime;

}
