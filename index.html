<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Life Choices Ultimate</title>

<style>
body{
background:#111827;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:15px;
}

.card{
background:#1f2937;
padding:15px;
border-radius:12px;
margin-bottom:12px;
}

button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-weight:bold;
}

.hidden{
display:none;
}

.stat{
margin:4px 0;
}
</style>
</head>

<body>

<div id="setup" class="card">

<h1>🌎 Life Choices Ultimate</h1>

<input id="name" placeholder="Name"
style="width:100%;padding:10px;border-radius:8px;">

<button onclick="startLife()">
👶 Begin Life
</button>

</div>

<div id="game" class="hidden">

<div class="card">

<h2 id="playerName"></h2>

<div class="stat">🎂 Age: <span id="age">0</span></div>
<div class="stat">💰 Money: $<span id="money">0</span></div>

<div class="stat">🧠 Smarts: <span id="smart">75</span></div>
<div class="stat">❤️ Happiness: <span id="happy">75</span></div>
<div class="stat">💪 Health: <span id="health">75</span></div>
<div class="stat">😎 Looks: <span id="looks">75</span></div>

</div>

<div class="card">

<h3>📖 Life Event</h3>

<p id="event">
Welcome to Life Choices Ultimate.
</p>

<button onclick="ageUp()">
🎂 Age Up
</button>

<button onclick="openMenu()">
☰ Activities
</button>

</div>

<div id="mainMenu" class="card hidden">

<h3>☰ Activities</h3>

<button onclick="showSection('education')">
📚 Education
</button>

<button onclick="showSection('career')">
💼 Career
</button>

<button onclick="showSection('relationships')">
❤️ Relationships
</button>

<button onclick="showSection('family')">
👶 Family
</button>

<button onclick="showSection('assets')">
🚗 Assets
</button>

<button onclick="showSection('social')">
📱 Social Media
</button>

<button onclick="showSection('crime')">
🚔 Crime
</button>

<button onclick="showSection('achievements')">
🏆 Achievements
</button>

</div>

<div id="education" class="card hidden">
<h3>📚 Education</h3>
<button>Go To School</button>
<button>Study Hard</button>
</div>

<div id="career" class="card hidden">
<h3>💼 Career</h3>
<button>Apply For Job</button>
<button>Work Harder</button>
<button>Ask For Raise</button>
</div>

<div id="relationships" class="card hidden">
<h3>❤️ Relationships</h3>
<button>Find Date</button>
<button>Talk To Partner</button>
</div>

<div id="family" class="card hidden">
<h3>👶 Family</h3>
<button>Spend Time With Family</button>
</div>

<div id="assets" class="card hidden">
<h3>🚗 Assets</h3>
<button>Buy Car</button>
<button>Buy House</button>
</div>

<div id="social" class="card hidden">
<h3>📱 Social Media</h3>
<button>Create Account</button>
<button>Post Video</button>
</div>

<div id="crime" class="card hidden">
<h3>🚔 Crime</h3>
<button>Shoplift</button>
<button>Vandalize</button>
<button>Steal Car</button>
</div>

<div id="achievements" class="card hidden">
<h3>🏆 Achievements</h3>
<p>None Yet</p>
</div>

</div>

<script>

let player={};

function startLife(){

player={
name:document.getElementById("name").value||"Alex",
age:0,
money:0,
smart:75,
happy:75,
health:75,
looks:75
};

document.getElementById("setup").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");

updateStats();

}

function updateStats(){

document.getElementById("playerName").innerHTML=
player.name;

document.getElementById("age").innerHTML=
player.age;

document.getElementById("money").innerHTML=
player.money;

document.getElementById("smart").innerHTML=
player.smart;

document.getElementById("happy").innerHTML=
player.happy;

document.getElementById("health").innerHTML=
player.health;

document.getElementById("looks").innerHTML=
player.looks;

}

function ageUp(){

player.age++;

document.getElementById("event").innerHTML=
"🎂 You are now age "+player.age;

updateStats();

}

function openMenu(){

document.getElementById("mainMenu")
.classList.toggle("hidden");

}

function showSection(id){

const sections=[
"education",
"career",
"relationships",
"family",
"assets",
"social",
"crime",
"achievements"
];

sections.forEach(s=>{
document.getElementById(s)
.classList.add("hidden");
});

document.getElementById(id)
.classList.remove("hidden");

}

</script>

</body>
</html>
